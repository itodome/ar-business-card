<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>いとどめ - AR Business Card</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        a-scene {
            width: 100%;
            height: 100%;
        }
        
        /* UIオーバーレイ */
        #ui-overlay {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 12px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        #links-container {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }
        
        .social-link {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        
        .social-link:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        .portfolio { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .twitter { background: #1DA1F2; color: white; }
        .github { background: #333; color: white; }
    </style>
</head>
<body>
    <a-scene background="color: #1a1a2e" ar-hit-test intersection-observer>
        <!-- ライティング -->
        <a-light type="ambient" intensity="0.8" color="#ffffff"></a-light>
        <a-light type="directional" intensity="0.6" position="5 10 7"></a-light>
        
        <!-- キャラクター画像（回転・背後に配置） -->
        <a-image 
            id="character"
            src="./assets/images/kanoko.png"
            position="0 0.8 -5"
            scale="1.6 1.6 1"
            animation="property: rotation; to: 0 360 0; dur: 6000; loop: true; easing: linear">
        </a-image>
        
        <!-- 名前（手前に配置） -->
        <a-text 
            value="いとどめ"
            position="0 -0.2 -1"
            scale="1.5 1.5 1"
            align="center"
            color="#ffffff"
            font="https://cdn.aframe.io/fonts/Roboto-msdf.json">
        </a-text>
        
        <!-- 職業（手前に配置） -->
        <a-text 
            value="Illustrator / Manga Creator"
            position="0 -0.6 -1"
            scale="0.8 0.8 1"
            align="center"
            color="#aaaaaa"
            font="https://cdn.aframe.io/fonts/Roboto-msdf.json">
        </a-text>
        
        <!-- ステータステキスト（手前に配置） -->
        <a-text 
            value="Self-published Manga Series"
            position="0 -1.0 -1"
            scale="0.6 0.6 1"
            align="center"
            color="#888888"
            font="https://cdn.aframe.io/fonts/Roboto-msdf.json">
        </a-text>
    </a-scene>
    
    <!-- UI オーバーレイ -->
    <div id="ui-overlay">
        📱 Tap below for links
    </div>
    
    <!-- リンク -->
    <div id="links-container">
        <a href="https://xfolio.jp/portfolio/it0dm" target="_blank" rel="noopener noreferrer" class="social-link portfolio" title="Portfolio">🎨</a>
        <a href="https://x.com/it0dm" target="_blank" rel="noopener noreferrer" class="social-link twitter" title="Twitter/X">𝕏</a>
        <a href="mailto:pawlownia@gmail.com" class="social-link github" title="Contact">📧</a>
    </div>

    <script>
        // 複数画像対応：images.json から動的に画像リストを読み込み
        let images = [];
        let currentIndex = 0;
        let rotationProgress = 0;
        let hasFlippedLeft = false;   // 左側（90度）で切り替わったか
        let hasFlippedRight = false;  // 右側（270度）で切り替わったか

        const IMAGE_DIR = './assets/images/';

        // images.json を読み込み（アニメーション開始前に読み込み完了を待つ）
        const imagesLoadedPromise = fetch('./images.json')
            .then(res => res.json())
            .then(data => {
                // ファイル名に assets/images/ プレフィックスを付加
                images = data.images.map(img => IMAGE_DIR + img);
                console.log(`✅ ${data.images.length} 個の画像をロード:`, data.images);
                
                // 初期画像を設定
                if (images.length > 0) {
                    document.getElementById('character').setAttribute('src', images[0]);
                }
                
                return true;
            })
            .catch(err => {
                console.error('❌ images.json の読み込み失敗:', err);
                return false;
            });

        // A-Frame シーンが読み込まれたら開始
        document.querySelector('a-scene').addEventListener('loaded', () => {
            imagesLoadedPromise.then(success => {
                if (success) {
                    setupImageRotation();
                }
            });
        });

        function setupImageRotation() {
            const characterEl = document.getElementById('character');
            let cycleStartTime = Date.now();
            
            // 定期的に進行度をチェック（33msごと ≈ 30fps）
            setInterval(() => {
                const now = Date.now();
                const elapsed = (now - cycleStartTime) % 6000;  // 6秒のサイクル
                rotationProgress = elapsed / 6000;  // 0.0 ~ 1.0
                
                // デバッグ出力
                // console.log(`🔄 進行度: ${rotationProgress.toFixed(3)} (${Math.round(rotationProgress * 360)}°)`);
                
                // 真横（90度 = 0.25進行度）で切り替え
                if (rotationProgress >= 0.24 && rotationProgress < 0.26 && !hasFlippedLeft && images.length > 0) {
                    hasFlippedLeft = true;
                    switchImage();
                }
                
                // 反対側（270度 = 0.75進行度）で切り替え
                if (rotationProgress >= 0.74 && rotationProgress < 0.76 && !hasFlippedRight && images.length > 0) {
                    hasFlippedRight = true;
                    switchImage();
                }
                
                // リセット（次のサイクルへ）
                if (rotationProgress < 0.05) {
                    hasFlippedLeft = false;
                    hasFlippedRight = false;
                }
            }, 33);
        }

        function switchImage() {
            if (images.length <= 1) return;  // 画像が1枚以下なら処理不要
            
            const characterEl = document.getElementById('character');
            currentIndex = (currentIndex + 1) % images.length;
            const nextImage = images[currentIndex];
            
            characterEl.setAttribute('src', nextImage);
            console.log(`🔄 画像切り替え: [${currentIndex + 1}/${images.length}]`);
        }
    </script>
</body>
</html>
