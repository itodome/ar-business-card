<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>いとどめ - AR Business Card</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        a-scene {
            width: 100%;
            height: 100%;
        }
        
        /* UIオーバーレイ */
        #ui-overlay {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 12px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        #links-container {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }
        
        .social-link {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        
        .social-link:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        .portfolio { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .twitter { background: #1DA1F2; color: white; }
        .github { background: #333; color: white; }
    </style>
</head>
<body>
    <a-scene background="color: #1a1a2e" ar-hit-test intersection-observer>
        <!-- ライティング -->
        <a-light type="ambient" intensity="0.8" color="#ffffff"></a-light>
        <a-light type="directional" intensity="0.6" position="5 10 7"></a-light>
        
        <!-- キャラクター画像（回転） -->
        <a-image 
            id="character"
            src="./assets/images/kanoko.png"
            position="0 0.8 -2"
            scale="1.6 1.6 1"
            animation="property: rotation; to: 0 360 0; dur: 6000; loop: true; easing: linear">
        </a-image>
        
        <!-- 名前 -->
        <a-text 
            value="いとどめ"
            position="0 -0.2 -2"
            scale="1.5 1.5 1"
            align="center"
            color="#ffffff"
            font="https://cdn.aframe.io/fonts/Roboto-msdf.json">
        </a-text>
        
        <!-- 職業 -->
        <a-text 
            value="Illustrator / Manga Creator"
            position="0 -0.6 -2"
            scale="0.8 0.8 1"
            align="center"
            color="#aaaaaa"
            font="https://cdn.aframe.io/fonts/Roboto-msdf.json">
        </a-text>
        
        <!-- ステータステキスト -->
        <a-text 
            value="Self-published Manga Series"
            position="0 -1.0 -2"
            scale="0.6 0.6 1"
            align="center"
            color="#888888"
            font="https://cdn.aframe.io/fonts/Roboto-msdf.json">
        </a-text>
    </a-scene>
    
    <!-- UI オーバーレイ -->
    <div id="ui-overlay">
        📱 Tap below for links
    </div>
    
    <!-- リンク -->
    <div id="links-container">
        <a href="https://xfolio.jp/portfolio/it0dm" target="_blank" rel="noopener noreferrer" class="social-link portfolio" title="Portfolio">🎨</a>
        <a href="https://x.com/it0dm" target="_blank" rel="noopener noreferrer" class="social-link twitter" title="Twitter/X">𝕏</a>
        <a href="mailto:pawlownia@gmail.com" class="social-link github" title="Contact">📧</a>
    </div>

    <script>
        // 複数画像対応：images.json から動的に画像リストを読み込み
        let images = [];
        let currentIndex = 0;
        let rotationProgress = 0;
        let hasFlipped = false;
        const IMAGE_DIR = './assets/images/';

        // images.json を読み込み
        fetch('./images.json')
            .then(res => res.json())
            .then(data => {
                // ファイル名に assets/images/ プレフィックスを追加
                images = data.images.map(img => IMAGE_DIR + img);
                console.log(`✅ ${data.images.length} 個の画像をロード:`, data.images);
                if (images.length === 0) {
                    console.warn('⚠️ 画像リストが空です');
                }
            })
            .catch(err => console.error('❌ images.json の読み込み失敗:', err));

        // A-Frame シーンが読み込まれたら開始
        document.querySelector('a-scene').addEventListener('loaded', () => {
            setupImageRotation();
        });

        function setupImageRotation() {
            const characterEl = document.getElementById('character');
            
            // 定期的に進行度をチェック（50msごと）
            setInterval(() => {
                const now = Date.now();
                if (!window.animationStartTime) {
                    window.animationStartTime = now;
                }
                
                const elapsed = (now - window.animationStartTime) % 6000;
                rotationProgress = elapsed / 6000;
                
                // 180度（0.5）に達したら切り替え
                if (rotationProgress >= 0.5 && !hasFlipped && images.length > 0) {
                    hasFlipped = true;
                    switchImage();
                }
                
                // リセット（次の周期へ）
                if (rotationProgress < 0.1 && hasFlipped) {
                    hasFlipped = false;
                    window.animationStartTime = null;
                }
            }, 50);
        }

        function switchImage() {
            if (images.length <= 1) return; // 画像が1枚以下なら処理不要
            
            const characterEl = document.getElementById('character');
            currentIndex = (currentIndex + 1) % images.length;
            const nextImage = images[currentIndex];
            
            characterEl.setAttribute('src', nextImage);
            console.log(`🔄 画像切り替え: [${currentIndex + 1}/${images.length}] ${nextImage}`);
        }
    </script>
</body>
</html>
